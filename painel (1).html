<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Aniversário Mari & Epi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#fdf8f2;--gold:#c9973a;--gold-light:#f0d080;--rose:#d4607a;--rose-light:#f9dde4;--green:#3a8c5c;--ink:#1a1208;--muted:#8a7060;--shadow:0 4px 24px rgba(80,40,10,.10);--shadow-lg:0 12px 48px rgba(80,40,10,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,#f0d08033 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,#d4607a22 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:1;text-align:center;padding:3.5rem 1rem 2rem}
.tag{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);background:#fdf3dc;border:1px solid #f0d080;border-radius:999px;padding:.28rem 1rem;margin-bottom:1rem}
header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.4rem);font-weight:900;color:var(--ink);line-height:1.1;margin-bottom:.5rem}
header h1 em{font-style:italic;color:var(--rose)}
.sub{font-size:.88rem;color:var(--muted);font-weight:300;letter-spacing:.03em}
.divider{width:60px;height:2px;background:linear-gradient(90deg,var(--gold-light),var(--rose));margin:1.4rem auto 0;border-radius:2px}
.grid-wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:1.1rem}
.card{background:#fff;border-radius:20px;padding:1.5rem 1.3rem 1.3rem;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;animation:fadeUp .5s ease both}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.10s}.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.20s}.card:nth-child(5){animation-delay:.25s}.card:nth-child(6){animation-delay:.30s}.card:nth-child(7){animation-delay:.35s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.card.c-gold::before{background:linear-gradient(90deg,var(--gold),var(--gold-light))}
.card.c-green::before{background:linear-gradient(90deg,var(--green),#7acca0)}
.card.c-rose::before{background:linear-gradient(90deg,var(--rose),#f4a0b5)}
.card.c-ink::before{background:linear-gradient(90deg,#6b5a4e,#b09a8a)}
.card.c-rose{cursor:pointer}
.card.c-rose:hover .hint{opacity:1;transform:translateY(0)}
.card-icon{font-size:1.6rem;margin-bottom:.7rem;display:block;line-height:1}
.lbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem;line-height:1.3}
.val{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;line-height:1;color:var(--ink)}
.val.gold{color:var(--gold)}.val.green{color:var(--green)}.val.rose{color:var(--rose)}.val.money{font-size:1.7rem;color:var(--gold)}
.hint{font-size:.68rem;font-weight:600;color:var(--rose);margin-top:.5rem;opacity:.6;transform:translateY(4px);transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:4px}
.overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;width:100%;max-width:420px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(26,18,8,.3);overflow:hidden;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhead{background:linear-gradient(135deg,var(--rose) 0%,#c04060 100%);color:#fff;padding:1.4rem 1.5rem 1.2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.mhead h2{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:.2rem}
.mhead p{font-size:.75rem;opacity:.8;font-weight:300}
.mclose{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.mclose:hover{background:rgba(255,255,255,.35)}
.msearch-wrap{padding:.9rem 1.2rem;border-bottom:1px solid #f0ece8;background:#fdfbf9}
.msearch-wrap input{width:100%;border:1.5px solid #ede8e0;border-radius:10px;padding:.5rem .9rem;font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;background:#fff;color:var(--ink);transition:border-color .2s}
.msearch-wrap input:focus{border-color:var(--rose)}
.mbody{overflow-y:auto;flex:1}
.mitem{padding:.72rem 1.5rem;font-size:.9rem;color:var(--ink);border-bottom:1px solid #f8f4f0;display:flex;align-items:center;gap:.75rem;transition:background .1s}
.mitem:hover{background:#fdf8f2}.mitem:last-child{border-bottom:none}
.mdot{width:8px;height:8px;border-radius:50%;background:var(--rose);flex-shrink:0}
.mempty{padding:2.5rem 1rem;text-align:center;color:var(--muted);font-size:.88rem;line-height:1.7}
.mfoot{padding:.7rem 1.5rem;border-top:1px solid #f0ece8;background:#fdfbf9;font-size:.72rem;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.mcount{background:var(--rose-light);color:var(--rose);font-weight:600;padding:.15rem .6rem;border-radius:999px;font-size:.72rem}
.status{position:relative;z-index:1;text-align:center;font-size:.72rem;color:var(--muted);padding:1rem 1rem 2rem}
.status a{color:var(--gold);text-decoration:none;font-weight:500}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:#eef9f3;color:var(--green);border:1px solid #b6e8ce;border-radius:999px;padding:.2rem .75rem;font-size:.7rem;font-weight:600}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:480px){.grid-wrap{grid-template-columns:repeat(2,1fr);gap:.8rem;padding:1.2rem 1rem 1rem}.val{font-size:2.4rem}.val.money{font-size:1.3rem}}
</style>
</head>
<body>

<header>
  <div class="tag">✨ Painel ao vivo</div>
  <h1>Aniversário<br><em>Mari & Epi</em></h1>
  <p class="sub">Acompanhe os convidados em tempo real</p>
  <div class="divider"></div>
</header>

<div class="grid-wrap" id="grid"></div>
<div class="status" id="status"></div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhead">
      <div>
        <h2>Não pagaram o chopp</h2>
        <p id="msubtitle"></p>
      </div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="msearch-wrap">
      <input id="msearch" type="text" placeholder="🔍  Buscar nome..." oninput="filterModal()">
    </div>
    <div class="mbody" id="mlist"></div>
    <div class="mfoot">
      <span>Lista ao vivo da planilha</span>
      <span class="mcount" id="mcount">0</span>
    </div>
  </div>
</div>

<script>
// ── Dados embutidos — sempre corretos ────────────────────────────────────────
const BASE = {
  confirmados: 55, beberChopp: 38, pagouChopp: 5,
  naoPagou: 33, naoResponderam: 26, naoVaoBeber: 17,
  totalGastos: 'R$ 780,75',
  naoPagaram: ["Giulia helena","Marco Tulio","Hiago Calvo","Isaac","Joyce",
    "Matheus calabresa","Moises","Beatriz","Fernando","Duda","Lucas Sampaio",
    "Bruno Fernando","Bernardo","Tio Paulo","Regina","Bolivar","Bessa","Saulo",
    "Suelly Esposa saulo","Ana luiza Gabriel","Pai Marco","Mãe Marco",
    "Gabriel Augusto","Leite, João","PH Cria","Dona Margo","Bruno",
    "Maria Luiza Macedo","Bruna","Lucas","Sônia","Kathleen","João Vitor"]
};

const URL_CONV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThvpgdanYTdMGOWHBqjWb4J228eDrGyHXUwMuTvzd60iAcUpu5BRaYvmq8Ufux8NA_GicTY8A1cm37/pub?gid=1875632085&single=true&output=csv';
const PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

let current = { ...BASE, naoPagaram: [...BASE.naoPagaram] };

// Renderiza imediatamente com dados embutidos
render(current);
setStatus('local');

// Tenta atualizar ao vivo em background
tryLive();

async function tryLive() {
  const urls = [URL_CONV, ...PROXIES.map(fn => fn(URL_CONV))];

  for (const url of urls) {
    try {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) continue;
      const text = await r.text();
      if (!text || text.length < 100) continue;

      const parsed = processCSV(text);

      // ✅ SÓ atualiza se os dados fizerem sentido (confirmados > 0)
      if (parsed.confirmados > 0) {
        current = parsed;
        render(current);
        setStatus('live');
        return;
      }
      // Se veio zerado, ignora e tenta próximo
    } catch(e) { continue; }
  }

  // Nenhum funcionou — mantém dados embutidos
  setStatus('local');
}

function processCSV(text) {
  const rows = parseCSV(text);
  let confirmados=0, beberChopp=0, pagouChopp=0,
      naoPagou=0, naoResponderam=0, naoVaoBeber=0;
  const naoPagaram = [];

  // Linha 0: título "CONVIDADOS"
  // Linha 1: vazia
  // Linha 2: cabeçalho (NOMES, PRESENÇA, VAI BEBER CHOPP?, PAGOU O CHOOP)
  // Dados: a partir da linha 3
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i];
    const nome     = (r[2] || '').trim();
    const presenca = norm(r[3] || '');
    const chopp    = norm(r[4] || '');
    const pagou    = norm(r[5] || '');

    if (!nome) continue;

    if (presenca === 'sim')                                      confirmados++;
    if (presenca.includes('nao respondeu'))                      naoResponderam++;
    if (chopp === 'sim')                                         beberChopp++;
    if (chopp.includes('nao vai') || chopp.includes('nao vao')) naoVaoBeber++;
    if (pagou === 'sim')                                         pagouChopp++;
    if (pagou === 'nao') { naoPagou++; naoPagaram.push(nome); }
  }

  return { confirmados, beberChopp, pagouChopp, naoPagou,
           naoResponderam, naoVaoBeber,
           totalGastos: BASE.totalGastos, naoPagaram };
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.replace(/\r/g,'').split('\n')) {
    if (!line.trim()) continue;
    const cols=[]; let cur='', q=false;
    for (const c of line) {
      if (c==='"'){q=!q;}
      else if (c===','&&!q){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function norm(s) {
  return (s||'').toString().trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function render(d) {
  document.getElementById('grid').innerHTML = `
    <div class="card c-gold">
      <span class="card-icon">🎊</span>
      <div class="lbl">Convidados Confirmados</div>
      <div class="val gold">${d.confirmados}</div>
    </div>
    <div class="card c-green">
      <span class="card-icon">🍺</span>
      <div class="lbl">Vão Beber Chopp</div>
      <div class="val green">${d.beberChopp}</div>
    </div>
    <div class="card c-green">
      <span class="card-icon">✅</span>
      <div class="lbl">Pagou o Chopp</div>
      <div class="val green">${d.pagouChopp}</div>
    </div>
    <div class="card c-rose" onclick="openModal()">
      <span class="card-icon">❌</span>
      <div class="lbl">Não Pagou o Chopp</div>
      <div class="val rose">${d.naoPagou}</div>
      <div class="hint">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        ver lista completa
      </div>
    </div>
    <div class="card c-ink">
      <span class="card-icon">💬</span>
      <div class="lbl">Não Responderam</div>
      <div class="val">${d.naoResponderam}</div>
    </div>
    <div class="card c-ink">
      <span class="card-icon">🚫</span>
      <div class="lbl">Não Vão Beber Chopp</div>
      <div class="val">${d.naoVaoBeber}</div>
    </div>
    <div class="card c-gold">
      <span class="card-icon">💰</span>
      <div class="lbl">Total Gastos</div>
      <div class="val money">${d.totalGastos}</div>
    </div>`;
}

function setStatus(mode) {
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const badge = mode === 'live'
    ? `<span class="live-badge"><span class="live-dot"></span> ao vivo</span>`
    : `<span style="color:var(--gold);font-weight:500">📋 dados embutidos</span>`;
  document.getElementById('status').innerHTML =
    `${badge} &nbsp;·&nbsp; ${now} &nbsp;·&nbsp; <a href="#" onclick="location.reload();return false">↺ atualizar</a>`;
}

function openModal() {
  document.getElementById('msearch').value = '';
  filterModal();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function filterModal() {
  const lista = current.naoPagaram;
  const q = norm(document.getElementById('msearch').value);
  const filtered = q ? lista.filter(n => norm(n).includes(q)) : [...lista];
  document.getElementById('msubtitle').textContent =
    `${lista.length} pessoa${lista.length !== 1 ? 's' : ''} na lista`;
  const listEl = document.getElementById('mlist');
  if (!lista.length) {
    listEl.innerHTML = '<div class="mempty">🎉 Ninguém deve chopp!<br>Todos pagaram.</div>';
  } else if (!filtered.length) {
    listEl.innerHTML = '<div class="mempty">Nenhum nome encontrado.</div>';
  } else {
    listEl.innerHTML = filtered
      .map(n => `<div class="mitem"><div class="mdot"></div>${n}</div>`)
      .join('');
  }
  document.getElementById('mcount').textContent =
    filtered.length + (filtered.length !== lista.length ? ` / ${lista.length}` : '');
}
</script>
</body>
</html>
